services:
  # -----------------------------------------------------------------------------------
  # BACKEND SERVICE
  # This sets up your Node.js server. 
  # Important Note: Free Tier Render instances sleep after 15 minutes of inactivity.
  # -----------------------------------------------------------------------------------
  - type: web
    name: pg-booking-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # You MUST manually set these secrets in your Render dashboard after creation
      - key: MONGO_URI
        sync: false 
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CLIENT_URL
        # This will securely read the generated URL of the frontend service automatically
        fromService:
          type: web
          name: pg-booking-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # -----------------------------------------------------------------------------------
  # FRONTEND STATIC SITE
  # This builds your React (Vite) application and serves it via Render's global CDN.
  # -----------------------------------------------------------------------------------
  - type: web
    name: pg-booking-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # React SPA redirect rule: always send traffic back to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: "REPLACE_ME_AFTER_DEPLOYMENT_IN_DASHBOARD"
      - key: VITE_SOCKET_URL
        value: "REPLACE_ME_AFTER_DEPLOYMENT_IN_DASHBOARD"
