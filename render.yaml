services:
  # -----------------------------------------------------------------------------------
  # BACKEND SERVICE
  # This sets up your Node.js server. 
  # Important Note: Free Tier Render instances sleep after 15 minutes of inactivity.
  # -----------------------------------------------------------------------------------
  - type: web
    name: pg-booking-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # You MUST manually set these secrets in your Render dashboard after creation
      - key: MONGO_URI
        sync: false 
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CLIENT_URL
        value: "REPLACE_ME_WITH_NETLIFY_URL"
